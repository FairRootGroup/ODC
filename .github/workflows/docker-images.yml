name: Docker Images

on:
  push:
    branches:
      - master
    paths:
      - 'utils/ci/Dockerfile.*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/fairrootgroup/odc-ci

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - fedora: fedora39
          - fedora: fedora40
          - fedora: fedora41
          - fedora: fedora42
          - fedora: fedora42-boost190

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: utils/ci
          file: utils/ci/Dockerfile.${{ matrix.fedora }}
          push: true
          tags: ${{ env.IMAGE_PREFIX }}:${{ matrix.fedora }}
          cache-from: type=registry,ref=${{ env.IMAGE_PREFIX }}:${{ matrix.fedora }}-cache
          cache-to: type=registry,ref=${{ env.IMAGE_PREFIX }}:${{ matrix.fedora }}-cache,mode=max
